apiVersion: batch/v1
kind: Job
metadata:
  name: rds-data-migration
  namespace: election
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      containers:
      - name: migration-worker
        # FIXED: Resolved malformed URL paths and missing variable tokens
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}://{IMAGE_TAG}
        env:
        - name: DB_SERVER
          value: "${RDS_ENDPOINT}"
        - name: DB_USER
          value: "${DB_USER}"
        - name: DB_PASS
          value: "${DB_PASS}"
        - name: DB_NAME
          value: "${DB_NAME}"
        - name: AWS_REGION
          value: "${AWS_REGION}"
        - name: S3_BUCKET
          value: "${S3_BUCKET}"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
              optional: true
      restartPolicy: Never
  backoffLimit: 1


apiVersion: apps/v1
kind: Deployment
metadata:
  name: election-backend
  namespace: election
  labels:
    app: election-backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: election-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: election-backend
        tier: api
      # FIXED: removed `checksum/config: "${IMAGE_TAG}"` — that annotation
      # existed to force a pod restart when envsubst changed the image tag.
      # Under Kustomize, changing the `images:` transformer's newTag already
      # changes the Deployment's pod template spec directly, which triggers
      # a rollout on its own. No annotation needed, and no bash var to
      # resolve here either.
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

      containers:
        - name: backend
          # FIXED: was "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}://{IMAGE_TAG}"
          # (broken bash interpolation). Now a placeholder name that the
          # Kustomize `images:` transformer in kustomization.yaml rewrites
          # into the full, correct ECR reference at render time.
          image: BACKEND_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5080
              protocol: TCP

          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: election-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: election-config
                  key: ASPNETCORE_URLS

            # These three must come from the Secret created out-of-band
            # (see 00-namespace.yaml) or from the ExternalSecret — never
            # plaintext here.
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: election-db-secret
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: election-db-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: election-db-secret
                  key: DB_PASS
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: election-config
                  key: DB_NAME

            # FIXED: was a bash-interpolated literal string built from
            # ${RDS_ENDPOINT}/${DB_USER}/${DB_PASS}/${DB_NAME} via envsubst.
            # This now uses Kubernetes' OWN native env-var expansion —
            # $(VAR_NAME) syntax, resolved by the kubelet itself, no shell
            # involved at all. Works identically whether applied by
            # `kubectl apply`, `kustomize build | kubectl apply`, or ArgoCD's
            # sync loop. Requirement: DB_HOST/DB_USER/DB_PASS/DB_NAME must be
            # defined earlier in this same env list, which they are.
            - name: ConnectionStrings__DefaultConnection
              value: "Server=$(DB_HOST);Database=$(DB_NAME);User Id=$(DB_USER);Password=$(DB_PASS);TrustServerCertificate=True;"

          livenessProbe:
            httpGet:
              path: /health
              port: 5080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 5080
            failureThreshold: 30
            periodSeconds: 5

          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: election-backend-svc
  namespace: election
  labels:
    app: election-backend
spec:
  type: ClusterIP
  selector:
    app: election-backend
  ports:
    - name: http
      port: 5080
      targetPort: 5080
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: election-backend-hpa
  namespace: election
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: election-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

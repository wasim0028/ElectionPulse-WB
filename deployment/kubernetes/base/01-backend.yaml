# ═══════════════════════════════════════════════════════════════════════════════
# Backend — ASP.NET Core 8 API
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: election-backend
  namespace: election
  labels:
    app: election-backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: election-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime deploy
  template:
    metadata:
      labels:
        app: election-backend
        tier: api
      annotations:
        # Force pod restart on config change
        checksum/config: "{{ include (print $.Template.BasePath '/00-namespace.yaml') . | sha256sum }}"
    spec:
      # ── Security context ────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000

      # ── Containers ──────────────────────────────────────────────────────────
      containers:
        - name: backend
          # ⚠ Replace 123456789.dkr.ecr.ap-south-1.amazonaws.com with your ECR URL
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/electionpulse-wb/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ── Environment ────────────────────────────────────────────────────
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: election-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: election-config
                  key: ASPNETCORE_URLS
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: election-db-secret
                  key: DB_HOST
              # Full connection string built in env
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: election-db-secret
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: election-db-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: election-db-secret
                  key: DB_PASS

          # ── Connection string as single env var ────────────────────────────
          # (override the ConfigMap version with the full string)
          envFrom:
            - configMapRef:
                name: election-config

          # ── Probes ─────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

          # ── Resources ──────────────────────────────────────────────────────
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
# ── Backend Service ────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: election-backend-svc
  namespace: election
  labels:
    app: election-backend
spec:
  type: ClusterIP      # internal only; exposed via frontend nginx proxy
  selector:
    app: election-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP

---
# ── HorizontalPodAutoscaler ────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: election-backend-hpa
  namespace: election
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: election-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

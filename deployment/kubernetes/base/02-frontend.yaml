# ═══════════════════════════════════════════════════════════════════════════════
# Frontend — React + Nginx
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: election-frontend
  namespace: election
  labels:
    app: election-frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: election-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: election-frontend
        tier: web
    spec:
      securityContext:
        runAsNonRoot: false    # nginx needs port 80
        fsGroup: 101

      containers:
        - name: frontend
          # ⚠ Replace with your actual ECR URL
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/electionpulse-wb/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add:  ["NET_BIND_SERVICE"]

      restartPolicy: Always
      terminationGracePeriodSeconds: 15

---
# ── Frontend Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: election-frontend-svc
  namespace: election
  labels:
    app: election-frontend
  annotations:
    # AWS Load Balancer Controller annotations
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
spec:
  type: LoadBalancer
  selector:
    app: election-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 80
      protocol: TCP

---
# ── Frontend HPA ───────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: election-frontend-hpa
  namespace: election
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: election-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

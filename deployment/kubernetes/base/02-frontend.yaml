# ═══════════════════════════════════════════════════════════════════════════════
# Frontend — React + Nginx
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: election-frontend
  namespace: election
  labels:
    app: election-frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: election-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: election-frontend
        tier: web
    spec:
      securityContext:
        # FIXED: was "runAsNonRoot: false" — needed previously because nginx's
        # master process started as root to chown cache dirs before dropping
        # to uid 101. The image now pre-chowns everything at build time and
        # declares "USER 101" directly, so the pod can enforce non-root now.
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101

      containers:
        - name: frontend
          # FIXED: was "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}://{IMAGE_TAG}" —
          # same copy-paste bug as 01-backend.yaml. Missing
          # ".amazonaws.com/electionpulse-wb/frontend" repo path, and had a
          # stray "//" plus missing "$" before "{IMAGE_TAG}", producing an
          # InvalidImageName error confirmed via kubectl describe pod.
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/electionpulse-wb/frontend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # NOTE: no additions needed anymore. The image now runs as
              # uid 101 with all cache/log directories pre-chowned at build
              # time (see Dockerfile.frontend), so nginx never needs CHOWN,
              # SETUID, or SETGID at runtime. NET_BIND_SERVICE isn't needed
              # either since 8080 is an unprivileged port (>1024).

      restartPolicy: Always
      terminationGracePeriodSeconds: 15

---
# ── Frontend Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: election-frontend-svc
  namespace: election
  labels:
    app: election-frontend

spec:
  # FIXED: Converted to ClusterIP to cooperate with your 03-ingress.yaml AWS Application Load Balancer
  type: ClusterIP
  selector:
    app: election-frontend
  ports:
    - name: http
      port: 80             # The port other pods/Ingress use inside the cluster
      targetPort: 8080     # FIXED: Routes traffic to your frontend's container port 8080
      protocol: TCP
    - name: https
      port: 443            # Traffic entering on port 443...
      targetPort: 8080     # ...is also forwarded to container port 8080
      protocol: TCP
---
# ── Frontend HPA ───────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: election-frontend-hpa
  namespace: election
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: election-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

# external-secret.yaml — OPTIONAL, requires External Secrets Operator (ESO)
# installed in the cluster (`helm install external-secrets external-secrets/external-secrets`).
#
# This replaces the imperative `kubectl create secret` step entirely. Once
# this is in place, election-db-secret is generated automatically from AWS
# Secrets Manager and kept in sync — no plaintext credential ever touches
# git or a kubectl command run from someone's laptop.

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: election
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: election-db-secret-reader   # needs its own IRSA role,
            # scoped to secretsmanager:GetSecretValue on just this one
            # secret ARN — same least-privilege pattern used for the ALB
            # controller and EBS CSI driver elsewhere in this stack.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: election-db-secret
  namespace: election
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: election-db-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: electionpulse-wb/rds
        property: host
    - secretKey: DB_USER
      remoteRef:
        key: electionpulse-wb/rds
        property: username
    - secretKey: DB_PASS
      remoteRef:
        key: electionpulse-wb/rds
        property: password

version: "3.9"

services:
  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile.frontend
    image: election-frontend:v1.0
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - election-net
    restart: unless-stopped
    # ── FIXED HEALTHCHECK FOR ALPINE NGINX ──
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── .NET 8 Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile.backend
    image: election-backend:v1.0
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Updated with your active admin user and devops#0028 credentials
      - ConnectionStrings__DefaultConnection=Server=database-1.c9os04k0moam.ap-south-1.rds.amazonaws.com,1433;Database=Test_Wasim;User Id=admin;Password=devops#0028;TrustServerCertificate=True;Encrypt=True;
    networks:
      - election-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  election-net:
    driver: bridge
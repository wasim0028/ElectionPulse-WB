version: "3.9"

services:
  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../                          # Takes Docker up to the root folder
      dockerfile: deployment/docker/Dockerfile.frontend # Point to the correct folder name
    image: election-frontend:v1.0
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - election-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── .NET 8 Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../                          # Takes Docker up to the root folder
      dockerfile: deployment/docker/Dockerfile.backend  # Point to the correct folder name
    image: election-backend:v1.0
    ports:
      - "5000:5080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=://amazonaws.com,1433;Database=Test_Wasim;User Id=admin;Password=devops#0028;TrustServerCertificate=True;Encrypt=True;
    networks:
      - election-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  election-net:
    driver: bridge
